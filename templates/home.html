{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>GroupsApp</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        .home-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 20px;
        }

        .home-buttons {
            display: flex;
            gap: 15px;
        }

        .home-buttons a button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #5b63f6;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="home-container">
        <h1>GroupsApp</h1>
        <p>Aplicación de mensajería por grupos</p>

        <div class="home-buttons">
            <a href="/login/"><button>Iniciar sesión</button></a>
            <a href="/register/"><button>Registrarse</button></a>
        </div>
    </div>
</body>
</html>
